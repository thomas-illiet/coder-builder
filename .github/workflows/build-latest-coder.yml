name: build-latest-coder

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compile Python scripts
        run: |
          python3 -m py_compile \
            scripts/build-coder.py \
            scripts/build-coder-in-docker.py \
            scripts/smoke-run-coder.py \
            scripts/doctor.py

      - name: Check help output
        run: |
          python3 scripts/build-coder.py --help
          python3 scripts/build-coder-in-docker.py --help
          python3 scripts/smoke-run-coder.py --help
          python3 scripts/doctor.py --help

      - name: Dry-run supported platforms
        run: |
          python3 scripts/build-coder.py \
            --dry-run \
            --ref v2.20.0 \
            --tag smoke \
            --platform linux \
            --embedded-os-arches linux_amd64,darwin_arm64
          make dry-run REF=v2.20.0 TAG=smoke PLATFORM=linux EMBEDDED_OS_ARCHES=linux_amd64,darwin_arm64

      - name: Reject Windows image platform
        shell: bash
        run: |
          if python3 scripts/build-coder.py --dry-run --platform windows 2> windows-error.log; then
            cat windows-error.log
            exit 1
          fi
          grep -q "Docker images are Linux-only" windows-error.log

  prepare:
    runs-on: ubuntu-latest
    outputs:
      coder_version: ${{ steps.coder.outputs.coder_version }}
      docker_version: ${{ steps.coder.outputs.docker_version }}
      embedded_os_arches: ${{ steps.coder.outputs.embedded_os_arches }}
      image: ${{ steps.image.outputs.image }}
      ref: ${{ steps.coder.outputs.ref }}
    steps:
      - name: Compute image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}/coder"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Resolve build targets
        id: coder
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              "https://api.github.com/repos/coder/coder/releases?per_page=30",
              headers={
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "custom-coder-builder",
              },
          )
          token = os.environ.get("GITHUB_TOKEN")
          if token:
              request.add_header("Authorization", f"Bearer {token}")

          with urllib.request.urlopen(request, timeout=30) as response:
              releases = json.loads(response.read().decode("utf-8"))

          ref = next(
              (
                  release["tag_name"]
                  for release in releases
                  if not release.get("draft") and not release.get("prerelease")
              ),
              None,
          )
          if not ref:
              raise SystemExit("Could not resolve the latest stable Coder release.")

          version = ref.removeprefix("v")
          docker_version = version.replace("+", "-")
          embedded_os_arches = "linux_amd64,darwin_arm64"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"ref={ref}\n")
              output.write(f"coder_version={version}\n")
              output.write(f"docker_version={docker_version}\n")
              output.write(f"embedded_os_arches={embedded_os_arches}\n")
          PY

  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    needs:
      - smoke
      - prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build latest Coder
        shell: bash
        env:
          EMBEDDED_OS_ARCHES: ${{ needs.prepare.outputs.embedded_os_arches }}
          IMAGE: ${{ needs.prepare.outputs.image }}
          REF: ${{ needs.prepare.outputs.ref }}
        run: |
          python3 scripts/build-coder-in-docker.py \
            --ref "${REF}" \
            --image "${IMAGE}" \
            --platform linux \
            --tag latest \
            --embedded-os-arches "${EMBEDDED_OS_ARCHES}"

      - name: Verify Linux x64 and Darwin ARM64 slim builds
        shell: bash
        env:
          CODER_VERSION: ${{ needs.prepare.outputs.coder_version }}
          EMBEDDED_OS_ARCHES: ${{ needs.prepare.outputs.embedded_os_arches }}
          REF: ${{ needs.prepare.outputs.ref }}
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["CODER_VERSION"]
          ref = os.environ["REF"]
          expected = sorted(os.environ["EMBEDDED_OS_ARCHES"].split(","))
          slug = re.sub(r"[^A-Za-z0-9._-]+", "-", ref.replace("/", "-")).strip("-")[:120] or "ref"
          worktree = Path(".cache") / "worktrees" / f"coder-{slug}"
          build_dir = worktree / "build"
          prefix = f"coder-slim_{version}_"

          actual = sorted(
              path.name.removeprefix(prefix)
              for path in build_dir.iterdir()
              if path.is_file()
              and path.name.startswith(prefix)
              and not path.name.endswith("_checksums.sha1")
          )

          if actual != expected:
              raise SystemExit(
                  "Unexpected embedded slim binaries. "
                  f"Expected {expected}, got {actual}."
              )
          print(f"Verified embedded slim binaries: {', '.join(actual)}")
          PY

      - name: Smoke-run amd64 image
        shell: bash
        env:
          DOCKER_VERSION: ${{ needs.prepare.outputs.docker_version }}
          IMAGE: ${{ needs.prepare.outputs.image }}
        run: |
          python3 scripts/smoke-run-coder.py \
            --image-ref "${IMAGE}:v${DOCKER_VERSION}-amd64" \
            --platform linux/amd64

      - name: Push validated image
        shell: bash
        env:
          DOCKER_VERSION: ${{ needs.prepare.outputs.docker_version }}
          IMAGE: ${{ needs.prepare.outputs.image }}
        run: |
          primary="${IMAGE}:v${DOCKER_VERSION}-amd64"
          docker push "${primary}"
          docker push "${IMAGE}:latest"
