name: build-latest-coder

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}/coder"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Build and push latest official Coder
        run: |
          python3 build-coder-in-docker.py \
            --ref latest-release \
            --image "${{ steps.image.outputs.image }}" \
            --tag latest \
            --push
